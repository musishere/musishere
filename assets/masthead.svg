<text x="550.0" y="64" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="12" font-weight="normal" font-style="normal" text-anchor="middle" fill="#4a4036" letter-spacing="3">THE INDEPENDENT JOURNAL OF BACKEND ENGINEERING</text>

<text x="392" y="520.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="bold" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">&#9656; Event-driven systems built atop</text>

<text x="96" y="478.0" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">USTAFA AHMED, a backend</text>

<text x="52" y="607.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">Worker pools, channel</text>
<text x="52" y="626.0" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">pipelines and message queues</text>
<text x="52" y="644.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">are his daily instruments;</text>
<text x="52" y="663.0" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">PostgreSQL and Redis, his</text>
<text x="52" y="681.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">filing cabinets of record.</text>
<text x="392" y="474" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13" font-weight="bold" font-style="normal" text-anchor="start" fill="#7c2d12" letter-spacing="1.5">THE RECORD</text>

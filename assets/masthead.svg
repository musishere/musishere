<text x="550.0" y="364" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="38" font-weight="bold" font-style="normal" text-anchor="middle" fill="#1c1a17" letter-spacing="0.5">SYSTEMS UNDER REAL-WORLD LOAD</text>

<text x="550.0" y="178" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="84" font-weight="bold" font-style="normal" text-anchor="middle" fill="#1c1a17" letter-spacing="1">The Mustafa Times</text>
<text x="550.0" y="212" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="17" font-weight="normal" font-style="italic" text-anchor="middle" fill="#4a4036" letter-spacing="0.5">&#8220;All the Code That&#8217;s Fit to Ship.&#8221;</text>

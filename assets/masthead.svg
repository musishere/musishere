<text x="96" y="533.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">building services that refuse</text>
<text x="52" y="552.0" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">to fall over. His specialty is</text>
<text x="52" y="570.5" font-family="Georgia, 'Times New Roman', 'Liberation Serif', serif" font-size="13.2" font-weight="normal" font-style="normal" text-anchor="start" fill="#1c1a17" letter-spacing="0">Go &#8212; and the quiet art of</text>
